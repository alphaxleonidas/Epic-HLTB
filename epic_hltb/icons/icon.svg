<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1b2838"/>
  <circle cx="64" cy="64" r="54" fill="#2a475e"/>

  <!-- Clock face -->
  <circle cx="64" cy="64" r="44" fill="#1b2838" stroke="#66c0f4" stroke-width="3"/>

  <!-- Clock marks -->
  <line x1="64" y1="24" x2="64" y2="32" stroke="#66c0f4" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="96" x2="64" y2="104" stroke="#66c0f4" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="64" x2="32" y2="64" stroke="#66c0f4" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="64" x2="104" y2="64" stroke="#66c0f4" stroke-width="3" stroke-linecap="round"/>

  <!-- Clock hands -->
  <line x1="64" y1="64" x2="64" y2="38" stroke="#c7d5e0" stroke-width="4" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="82" y2="76" stroke="#66c0f4" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="64" cy="64" r="4" fill="#66c0f4"/>
</svg>
